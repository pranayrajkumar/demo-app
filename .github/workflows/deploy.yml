name: CI/CD Pipeline to Self-Hosted EC2

on:
  push:
    branches:
    - main

jobs:
  # Job 1: Build the app and push the Docker image to Docker Hub
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:latest

  # Job 2: Pull the image and run it directly on your EC2 self-hosted runner
  deploy-to-ec2:
    needs: build-and-push
    runs-on: self-hosted # This tells GitHub to execute these steps on your EC2 instance

    steps:
    - name: Pull and Run Docker Container
      run: |
        # 1. Log in to Docker Hub (prevents rate limits and allows private repo access if needed)
        echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

        # 2. Pull the latest image
        docker pull ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:latest

        # 3. Stop and remove the existing container (ignores errors if it doesn't exist yet)
        docker stop demo-app-container || true
        docker rm demo-app-container || true

        # 4. Run the new container, mapping port 8080 on EC2 to port 8080 in the container
        docker run -d -p 8080:8080 --name demo-app-container ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:latest

        # 5. Clean up old dangling images to save disk space on your EC2 instance
