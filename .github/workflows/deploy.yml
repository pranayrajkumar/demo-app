name: CI/CD Pipeline to Self-Hosted EC2

on:
  workflow_dispatch: 

jobs:
  # Job 1: Build the app and push the Docker image to Docker Hub
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN  }}

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:latest .
    - name: Push The Image To Docker Repo
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:latest

    - name: Docker Image Deploy To EC2 Instance
      uses: appleboy/ssh-action@v1.1.0
      with:
        hosts: ${{ secrets.EC2_INSTANCE_IP }}
        username: ${{ secrets.EC2_USER_NAME }}
        key: ${{ secrets.EC2_PEM_FILE }}
        script: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:latest
          docker run -d -p  8080:8080 --name java-container ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:latest
      
 
